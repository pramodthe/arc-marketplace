services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - PUBLIC_BASE_URL=http://localhost:4021
      - SERVER_URL=http://backend:4021
    ports:
      - "4021:4021"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4021
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
